schema_version = "1.0"
candidate_pool_target_recordings_per_species = 80
target_recordings_per_species = 40

[api]
version = "xeno-canto_api_v3"
endpoint = "https://xeno-canto.org/api/3/recordings"
query_form = "grp:birds gen:<genus> sp:<specific_epithet>"
api_key_environment = "XENO_CANTO_API_KEY"
request_interval_seconds = 1.0
timeout_seconds = 30.0
maximum_retries = 5
pagination_policy = "all_server_reported_pages_in_ascending_order"
snapshot_consistency = "exact_numRecordings_numSpecies_numPages_and_page"
duplicate_recording_policy = "fatal"

[[species]]
role = "primary"
active = true
common_name = "Brown-headed Barbet"
scientific_name = "Psilopogon zeylanicus"
difficulty_group = "family_matched"

