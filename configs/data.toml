schema_version = "1.0"
raw_audio_dir = "dataset"
local_manifest = "data/manifests/local_recordings.csv"
enriched_manifest = "data/manifests/recordings.csv"
split_manifest = "data/splits/split_v1.csv"
split_summary = "data/splits/split_v1_summary.json"
split_lock = "data/splits/split_v1_lock.json"
minimum_source_sample_rate_hz = 32000
target_sample_rate_hz = 32000
target_channels = 1
audio_dtype = "float32"
clip_duration_seconds = 3.0
split_seed = 20260713
train_fraction = 0.70
validation_fraction = 0.15
test_fraction = 0.15

[quality_control]
full_decode_warning_policy = "exclude"
minimum_decoded_to_ffprobe_duration_ratio = 0.98
maximum_decoded_to_ffprobe_duration_ratio = 1.02

[session_grouping]
coordinate_radius_km = 1.0
missing_date_policy = "manual_review_and_conservative_grouping"
missing_recordist_policy = "manual_review_and_conservative_grouping"
missing_location_policy = "connect_within_recordist_date"
same_individual_reference_policy = "global_link_or_manual_review"

[clip_selection]
maximum_clips_per_recording = 5
uniform_clip_count_formula = "min(5,max(1,floor(duration_seconds/3)))"
uniform_start_rule = "linspace_0_to_duration_minus_3"
energy_candidate_hop_seconds = 1.5
include_end_aligned_candidate = true
energy_measure = "mean_unlogged_stft_power_150_to_14000_hz"
tie_break = "earlier_start"
minimum_selected_start_separation_seconds = 3.0
epoch_draws = "selected_training_clip_count"

[spectrogram]
n_fft = 1024
win_length = 1024
hop_length = 256
window = "hann"
center = false
n_mels = 128
f_min_hz = 150
f_max_hz = 14000
power = 2.0
mel_scale = "slaney"
htk = false
mel_normalization = "slaney"
power_to_db_reference = "per_clip_max"
power_to_db_amin = 1e-10
minimum_db = -80.0
maximum_db = 0.0
output_height = 224
output_width = 224
expected_native_height = 128
expected_native_width = 372
resize_mode = "bicubic"
resize_align_corners = false
resize_antialias = true

